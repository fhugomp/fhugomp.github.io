<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio</title>
</head>
<body class="tema-escuro">
    <header id="cabecalho" class="cabecalho-principal">
        <div class="logo-container">
            <h1 class="logo-texto"></h1>
        </div>
        
        <button id="btn-menu-mobile" class="menu-toggle">
            <span class="material-symbols-outlined"></span>
        </button>

        <nav id="menu-navegacao" class="nav-oculta-mobile">
            <ul class="lista-links">
                <li class="item-link"><a href="" class="link-nav"></a></li>
                <li class="item-link"><a href="" class="link-nav"></a></li>
                <li class="item-link"><a href="" class="link-nav"></a></li>
                <li class="item-link"><a href="" class="link-nav"></a></li>
                <li class="item-link"><a href="" class="link-nav"></a></li>
            </ul>
        </nav>
    </header>

    <main class="conteudo-principal">

        <section id="inicio" class="secao-hero">
            <div class="hero-texto">
                <h2 class="titulo-principal"></h2>
                <p class="subtitulo"></p>
                <a href="" class="btn btn-primario"></a>
            </div>
            <div class="hero-imagem">
                <img src="" alt="" class="foto-perfil">
            </div>
        </section>

        <section id="sobre" class="secao-sobre">
            <h2 class="titulo-secao"></h2>
            <div class="sobre-conteudo">
                <p class="texto-corrido"></p>
            </div>
        </section>

        <section id="habilidades" class="secao-habilidades">
            <h2 class="titulo-secao"></h2>
            <div class="grid-habilidades">
                <article class="card-habilidade">
                    <span class="material-symbols-outlined icone-destaque"></span>
                    <h3 class="titulo-card"></h3>
                    <p class="texto-card"></p>
                </article>
            </div>
        </section>

        <section id="projetos" class="secao-projetos">
            <h2 class="titulo-secao"></h2>
            <div class="grid-projetos">
                <article class="card-projeto">
                    <img src="" alt="" class="imagem-projeto">
                    <div class="info-projeto">
                        <h3 class="titulo-projeto"></h3>
                        <p class="descricao-projeto"></p>
                        <div class="botoes-projeto">
                            <a href="" class="btn btn-secundario"></a>
                        </div>
                    </div>
                </article>
            </div>
        </section>

        <section id="contato" class="secao-contato">
            <h2 class="titulo-secao"></h2>
            <form id="form-contato" class="formulario">
                <div class="grupo-input">
                    <label for="" class="label-form"></label>
                    <input type="" id="" class="campo-form">
                </div>
                <div class="grupo-input">
                    <label for="" class="label-form"></label>
                    <input type="" id="" class="campo-form">
                </div>
                <div class="grupo-input">
                    <label for="" class="label-form"></label>
                    <textarea id="" class="campo-form texto-area"></textarea>
                </div>
                <button type="" id="btn-enviar" class="btn btn-primario"></button>
                <p id="status-mensagem" class="mensagem-oculta"></p>
            </form>
        </section>

    </main>

    <footer id="rodape" class="rodape-site">
        <div class="links-sociais">
            <a href="" class="icone-social"></a>
            <a href="" class="icone-social"></a>
        </div>
        <p class="texto-direitos"></p>
    </footer>

    <button id="btn-topo" class="btn-flutuante oculto">
        <span class="material-symbols-outlined"></span>
    </button>

    <script src=""></script>
</body>
</html>
